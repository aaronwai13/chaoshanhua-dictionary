<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>潮汕話詞庫</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="潮汕話詞庫">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F7F7F5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111112" media="(prefers-color-scheme: dark)">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F7F7F5;
      --white: #FFFFFF;
      --text: #111110;
      --text-muted: #888884;
      --text-light: #BBBBB8;
      --border: #E5E5E2;
      --border-strong: #D0D0CC;
      --accent: #C8372E;
      --accent-light: #F9ECEB;
      --green: #1A6B45;
      --green-light: #E8F5EE;
      --amber: #8B5E00;
      --amber-light: #FEF7E8;
      --red: #C0392B;
      --red-light: #FDF0EE;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111112;
        --white: #1C1C1E;
        --text: #F2F2F0;
        --text-muted: #888884;
        --text-light: #48484A;
        --border: #2A2A2C;
        --border-strong: #3A3A3C;
        --accent: #E87070;
        --accent-light: #2A1111;
        --green: #4ADE80;
        --green-light: #0A2016;
        --amber: #FCD34D;
        --amber-light: #251A00;
        --red: #F87171;
        --red-light: #2A1010;
        --shadow: 0 2px 16px rgba(0,0,0,0.4);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
    }
    #app { max-width: 480px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      background: var(--white);
      padding: 20px 16px 0;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }
    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      margin-bottom: 12px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg); color: var(--text);
      font-family: 'Figtree', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    /* ── Filter chips ── */
    .filter-row { display: flex; gap: 6px; padding-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 1; text-align: center; padding: 6px 4px; border-radius: 99px;
      font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border-strong);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap; min-width: fit-content;
    }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Vocab list ── */
    .count-bar {
      font-size: 12px; color: var(--text-muted);
      padding: 8px 16px 2px;
      font-family: 'DM Mono', monospace;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px 16px 0;
    }
    .toolbar-btn {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border-strong);
      background: var(--white);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .toolbar-btn:active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .audit-panel {
      margin: 8px 16px 0;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: none;
    }
    .audit-panel.show { display: block; }
    .audit-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 10px;
    }
    .audit-summary {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .audit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .audit-item {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .audit-item:first-child {
      padding-top: 0;
      border-top: none;
    }
    .word-list { padding: 10px 16px 16px; display: flex; flex-direction: column; gap: 9px; }
    .word-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow);
    }
    .word-zh { font-size: 22px; font-weight: 600; min-width: 56px; }
    .word-info { flex: 1; min-width: 0; }
    .word-ro {
      font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--accent); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badge {
      font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 999px;
      font-family: 'DM Mono', monospace; display: inline-flex; align-items: center;
      margin-top: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted);
      cursor: pointer;
    }
    .badge:active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .word-edit-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all 0.15s;
    }
    .word-edit-btn:active { border-color: var(--accent); color: var(--accent); }

    .empty-state { text-align: center; padding: 52px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-text { font-size: 15px; }

    /* ── Phonetics tab ── */
    .phonetics-wrap { padding: 16px; }
    .hint-text { font-size: 14px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    .sentence-input {
      width: 100%; min-height: 96px;
      padding: 12px; border: 1.5px solid var(--border);
      border-radius: 12px; background: var(--white); color: var(--text);
      font-family: 'Figtree', sans-serif; font-size: 17px;
      outline: none; resize: vertical; transition: border-color 0.15s;
      line-height: 1.5;
    }
    .sentence-input:focus { border-color: var(--accent); }
    .sentence-input::placeholder { color: var(--text-muted); }

    .result-area {
      margin-top: 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      display: none; box-shadow: var(--shadow);
    }
    .result-area.show { display: block; }
    .result-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'DM Mono', monospace; margin-bottom: 14px;
    }
    .phonetic-tokens { display: flex; flex-wrap: wrap; gap: 6px 10px; }
    .phonetic-token {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 8px; background: var(--bg); border-radius: 8px;
    }
    .phonetic-token .p-ro {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--accent); font-weight: 500;
      white-space: nowrap;
    }
    .phonetic-token .p-zh { font-size: 20px; font-weight: 600; }
    .phonetic-token.unknown {
      cursor: pointer;
      border: 1.5px dashed var(--border-strong);
      transition: background 0.15s, border-color 0.15s;
    }
    .phonetic-token.unknown:active { background: var(--accent-light); border-color: var(--accent); }
    .phonetic-token.unknown .p-ro { color: var(--text-light); }
    .phonetic-token.unknown .p-zh { color: var(--text-muted); }
    .phonetic-token.space { background: transparent; padding: 6px 2px; }
    .phonetic-token.space .p-zh { font-size: 14px; color: var(--text-light); }

    /* ── Add tab ── */
    .add-wrap { padding: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text-muted); font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 11px 12px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--white); color: var(--text);
      font-family: 'Figtree', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.15s;
      appearance: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }

    .backup-panel {
      margin-top: 24px;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .backup-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 8px;
    }
    .backup-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .backup-actions {
      display: flex;
      gap: 8px;
    }
    .backup-actions .btn-secondary,
    .backup-actions .btn-primary {
      margin-top: 0;
    }
    .category-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: block; width: 100%; padding: 13px;
      background: var(--accent); color: white; border: none;
      border-radius: 12px; font-family: 'Figtree', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 12px; transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      flex: 1; padding: 12px;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border-strong); border-radius: 10px;
      font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-danger {
      padding: 12px 16px;
      background: var(--red-light); color: var(--red); border: none;
      border-radius: 10px; font-family: 'Figtree', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: 60px; background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-bar::after {
      content: ''; position: absolute;
      bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      height: env(safe-area-inset-bottom, 0px);
      background: var(--white);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); transition: color 0.15s;
      font-family: 'Figtree', sans-serif;
    }
    .tab-btn span { font-size: 10px; font-weight: 600; }
    .tab-btn.active { color: var(--accent); }

    /* ── Modal sheet ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; max-width: 480px; margin: 0 auto;
      background: var(--white); border-radius: 20px 20px 0 0;
      padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-drag {
      width: 36px; height: 4px; background: var(--border-strong);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px; margin-bottom: 16px;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600; z-index: 300;
      opacity: 0; transition: opacity 0.2s; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── 詞庫 Tab ── -->
  <div id="pageVocab" class="page active">
    <div class="header">
      <div class="header-title">潮汕話詞庫</div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="searchInput" type="search" placeholder="搜索漢字或注音…">
      </div>
      <div class="filter-row" id="filterRow"></div>
    </div>
    <div class="count-bar" id="countBar"></div>
    <div class="toolbar">
      <button class="toolbar-btn" id="refreshBtn">重新整理</button>
      <button class="toolbar-btn" id="auditCategoriesBtn">檢查分類</button>
    </div>
    <div class="audit-panel" id="auditPanel">
      <div class="audit-title">分類檢查</div>
      <div class="audit-summary" id="auditSummary"></div>
      <div class="audit-list" id="auditList"></div>
    </div>
    <div class="word-list" id="wordList"></div>
  </div>

  <!-- ── 注音 Tab ── -->
  <div id="pagePhonetics" class="page">
    <div class="header">
      <div class="header-title">句子注音</div>
    </div>
    <div class="phonetics-wrap">
      <p class="hint-text">輸入句子，自動逐詞顯示潮汕話注音。未收錄的字會標示 —</p>
      <textarea class="sentence-input" id="sentenceInput" placeholder="例：我搭巴士去学校"></textarea>
      <button class="btn-primary" id="analyzeBtn">顯示注音</button>
      <div class="result-area" id="resultArea">
        <div class="result-label">注音結果</div>
        <div class="phonetic-tokens" id="phoneticTokens"></div>
      </div>
    </div>
  </div>

  <!-- ── 新增 Tab ── -->
  <div id="pageAdd" class="page">
    <div class="header">
      <div class="header-title">新增詞語</div>
    </div>
    <div class="add-wrap">
      <div class="form-group">
        <label class="form-label">漢字</label>
        <input class="form-input" id="addZh" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">潮汕注音</label>
        <input class="form-input" id="addRo" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">類別</label>
        <input class="form-input" id="addCat" list="catList">
        <datalist id="catList">
          <option value="食材"><option value="蔬菜"><option value="麵食">
          <option value="常用語"><option value="交通"><option value="代詞">
          <option value="動詞"><option value="地點"><option value="其他">
        </datalist>
        <p class="category-hint" id="addCatHint">輸入漢字後會自動建議類別；你都可以直接改成新類別。</p>
      </div>
      <button class="btn-primary" id="addBtn">儲存詞語</button>

      <div class="backup-panel">
        <div class="backup-title">詞庫備份</div>
        <p class="backup-text">匯出目前詞庫做備份；如果主畫面 app 或瀏覽器資料被清，可以用 JSON 檔匯入還原。</p>
        <div class="backup-actions">
          <button class="btn-secondary" id="exportBtn">匯出詞庫</button>
          <button class="btn-primary" id="importBtn">匯入詞庫</button>
        </div>
        <input id="importFileInput" type="file" accept="application/json,.json" hidden>
      </div>
    </div>
  </div>

  <!-- ── Quick-add Modal（撳未收錄字彈出） ── -->
  <div class="modal-overlay" id="quickAddModal">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div class="modal-title">新增注音</div>
      <div class="form-group">
        <label class="form-label">漢字</label>
        <input class="form-input" id="qaZh" type="text" readonly style="color:var(--text-muted)">
      </div>
      <div class="form-group">
        <label class="form-label">潮汕注音</label>
        <input class="form-input" id="qaRo" type="text" placeholder="例：kě">
      </div>
      <div class="form-group">
        <label class="form-label">類別（自動建議）</label>
        <input class="form-input" id="qaCat" list="catList">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="qaCancelBtn">取消</button>
        <button class="btn-primary" style="flex:2;margin-top:0" id="qaSaveBtn">儲存並更新注音</button>
      </div>
    </div>
  </div>

  <!-- ── Edit Modal ── -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div class="modal-title">修改詞語</div>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">漢字</label>
        <input class="form-input" id="editZh" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">潮汕注音</label>
        <input class="form-input" id="editRo" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">類別</label>
        <select class="form-input" id="editCatSelect"></select>
      </div>
      <div class="form-group">
        <label class="form-label">自訂類別（可選）</label>
        <input class="form-input" id="editCatCustom" type="text" placeholder="如果唔想用現有類別，可以自己輸入">
      </div>
      <div class="modal-actions">
        <button class="btn-danger" id="deleteBtn">刪除</button>
        <button class="btn-secondary" id="cancelBtn">取消</button>
        <button class="btn-primary" style="flex:2;margin-top:0" id="saveEditBtn">儲存</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

</div><!-- #app -->

<!-- ── Tab Bar ── -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabVocab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <span>詞庫</span>
  </button>
  <button class="tab-btn" id="tabPhonetics">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>注音</span>
  </button>
  <button class="tab-btn" id="tabAdd">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
    </svg>
    <span>新增</span>
  </button>
</div>

<script>
  // ── Default vocabulary ──
  const DEFAULT_VOCAB = [
    { id:  1, zh: '猪肉',   ro: 'dē nīk',       cat: '食材' },
    { id:  2, zh: '肉饼',   ro: 'nīk biā',       cat: '食材' },
    { id:  3, zh: '生蚝',   ro: 'zuī sě',        cat: '食材' },
    { id:  4, zh: '猪腰',   ro: 'xiǎng jì',      cat: '食材' },
    { id:  5, zh: '粉肠',   ro: 'dē hòn',        cat: '食材' },
    { id:  6, zh: '猪肝',   ro: 'dē guā',        cat: '食材' },
    { id:  7, zh: '淡菜',   ro: 'dǎ cǎi',        cat: '食材' },
    { id:  8, zh: '猪心',   ro: 'dē sǐm',        cat: '食材' },
    { id:  9, zh: '前栏肉', ro: 'zoǐ lāng',      cat: '食材' },
    { id: 10, zh: '生菜',   ro: 'pāng cǎi',      cat: '蔬菜' },
    { id: 11, zh: '西洋菜', ro: 'sāi ngō',       cat: '蔬菜' },
    { id: 12, zh: '益母草', ro: 'yàk bmó cào',   cat: '蔬菜' },
    { id: 13, zh: '粿条',   ro: 'gwé diāo',      cat: '麵食' },
    { id: 14, zh: '面薄',   ro: 'mǐ bòk',        cat: '麵食' },
    { id: 15, zh: '米粉',   ro: 'bmí hòn',       cat: '麵食' },
    { id: 16, zh: '多谢',   ro: 'zǒi xǐa',       cat: '常用語' },
    { id: 17, zh: '不用',   ro: 'miàng',         cat: '常用語' },
    { id: 18, zh: '多少钱', ro: 'lueǒ zǒi jī',   cat: '常用語' },
    { id: 19, zh: '地铁',   ro: 'dǐ tīk',        cat: '交通' },
    { id: 20, zh: '巴士',   ro: 'gōng qiā',      cat: '交通' },
    { id: 21, zh: '飞机',   ro: 'buēi gī',       cat: '交通' },
    { id: 22, zh: '轮船',   ro: 'lǒǒn zōon',     cat: '交通' },
    { id: 23, zh: '单车',   ro: 'kā qiā',        cat: '交通' },
    { id: 24, zh: '摩托',   ro: 'mǒ tǒ',         cat: '交通' },
    { id: 25, zh: '汽车',   ro: 'kī qiā',        cat: '交通' },
    { id: 26, zh: '高铁',   ro: 'gāo tīk',       cat: '交通' },
    { id: 27, zh: '我',     ro: 'wà',            cat: '代詞' },
    { id: 28, zh: '你',     ro: 'lè',            cat: '代詞' },
    { id: 29, zh: '他',     ro: 'ī',             cat: '代詞' },
    { id: 30, zh: '和',     ro: 'gàk',           cat: '動詞' },
    { id: 31, zh: '搭',     ro: 'dǎk',           cat: '動詞' },
    { id: 32, zh: '去',     ro: 'kě',            cat: '動詞' },
    { id: 33, zh: '公园',   ro: 'gōng hneē',     cat: '地點' },
    { id: 34, zh: '学校',   ro: 'hǎk háo',       cat: '地點' },
    { id: 35, zh: '商场',   ro: 'xiāng diō',     cat: '地點' },
  ];

  // ── State ──
  const APP_VERSION = '2026.04.14.3';
  const STORAGE_KEY = 'teochew_vocab_v1';
  const CATEGORY_REPAIR_MAP = {
    '粉肠': '食材',
    '淡菜': '食材',
    '面薄': '麵食',
    '多谢': '常用語',
    '不用': '常用語',
    '多少钱': '常用語',
    '飞机': '交通',
    '单车': '交通',
    '和': '動詞',
    '商场': '地點'
  };
  let vocab = [];
  let activeFilter = '全部';
  let addCatTouched = false;

  // ── Storage ──
  function repairKnownCategories(list) {
    let repaired = 0;

    list.forEach(word => {
      const expected = CATEGORY_REPAIR_MAP[word.zh];
      if (!expected) return;

      const current = normalizeCategory(word.cat);
      if (current === expected) return;

      word.cat = expected;
      repaired += 1;
    });

    return repaired;
  }
  function loadData() {
    const fallback = JSON.parse(JSON.stringify(DEFAULT_VOCAB));

    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        vocab = fallback;
        return;
      }

      const parsed = JSON.parse(saved);
      vocab = Array.isArray(parsed) ? parsed : fallback;
      const repaired = repairKnownCategories(vocab);
      if (repaired) {
        saveData();
        setTimeout(() => showToast(`已修復 ${repaired} 個已知分類錯誤`), 80);
      }
    } catch (err) {
      localStorage.removeItem(STORAGE_KEY);
      vocab = fallback;
      setTimeout(() => showToast('本地資料讀取失敗，已回復預設詞庫'), 80);
    }
  }
  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(vocab));
  }
  function nextId() {
    return vocab.length ? Math.max(...vocab.map(w => w.id)) + 1 : 1;
  }
  function findWordByZh(zh) {
    return vocab.find(w => w.zh === zh);
  }
  function uniqueCategories() {
    return [...new Set(vocab.map(w => String(w.cat || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-HK'));
  }
  function categoryExists(cat) {
    return uniqueCategories().includes(cat);
  }
  function normalizeCategory(cat) {
    const trimmed = String(cat || '').trim();
    return trimmed || '其他';
  }
  function ensureActiveFilter() {
    const available = ['全部', ...uniqueCategories()];
    if (!available.includes(activeFilter)) activeFilter = '全部';
  }
  function downloadFile(filename, content, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }
  function normalizeImportedVocab(input) {
    if (!Array.isArray(input)) return null;

    const seen = new Set();
    const normalized = [];

    input.forEach(item => {
      if (!item || typeof item !== 'object') return;

      const zh = String(item.zh || '').trim();
      const ro = String(item.ro || '').trim();
      const cat = String(item.cat || '其他').trim() || '其他';

      if (!zh || !ro || seen.has(zh)) return;
      seen.add(zh);
      normalized.push({
        id: normalized.length + 1,
        zh,
        ro,
        cat
      });
    });

    return normalized.length ? normalized : null;
  }

  // ── Auto-guess category ──
  function guessCategory(zh) {
    const text = String(zh || '').trim();
    if (!text) return null;

    if (CATEGORY_REPAIR_MAP[text]) return CATEGORY_REPAIR_MAP[text];

    if ([...'我你他她它您咱俺'].some(c => text.includes(c))) return '代詞';
    if ([...'去來到走搭坐吃喝買賣看聽說问問叫要用'].some(c => text === c)) return '動詞';
    if (/[菜草薯瓜豆芽苗蔥葱蒜薑姜韭]/.test(text)) return '蔬菜';
    if (/[肉雞鸡魚鱼蝦虾蟹鴨鸭豬猪牛羊蚝蠔蛤蜆肠腸肝腰心]/.test(text)) return '食材';
    if (/[粿條条粉麵面飯饭餃饺包餅饼糕]/.test(text)) return '麵食';
    if (/[車车機机船鐵铁巴飛飞高地單单摩汽輪轮]/.test(text)) return '交通';
    if (/[校場场園园店市院廳厅館馆所廟庙街商場场]/.test(text)) return '地點';
    if (['多谢', '謝謝', '唔使', '不用', '多少钱', '多少錢'].includes(text)) return '常用語';

    return null;
  }
  function suggestedCategory(zh) {
    const guessed = guessCategory(zh);
    return categoryExists(guessed) ? guessed : guessed;
  }
  function updateCategoryOptions() {
    const list = document.getElementById('catList');
    list.innerHTML = uniqueCategories().map(cat => `<option value="${esc(cat)}">`).join('');
  }
  function populateEditCategoryOptions(selectedCat) {
    const select = document.getElementById('editCatSelect');
    const options = uniqueCategories();
    const hasSelected = options.includes(selectedCat);
    select.innerHTML = [
      ...options.map(cat => `<option value="${esc(cat)}"${cat === selectedCat ? ' selected' : ''}>${esc(cat)}</option>`),
      `<option value="__custom__"${hasSelected ? '' : ' selected'}>自訂類別</option>`
    ].join('');
    document.getElementById('editCatCustom').value = hasSelected ? '' : selectedCat;
  }
  function getEditCategoryValue() {
    const selectValue = document.getElementById('editCatSelect').value;
    const customValue = document.getElementById('editCatCustom').value;
    return normalizeCategory(selectValue === '__custom__' ? customValue : selectValue);
  }
  function syncEditCategoryInputState() {
    const isCustom = document.getElementById('editCatSelect').value === '__custom__';
    const input = document.getElementById('editCatCustom');
    input.disabled = !isCustom;
    input.placeholder = isCustom ? '輸入新類別' : '如果唔想用現有類別，可以自己輸入';
  }
  function updateAddCategoryHint(cat) {
    const hint = document.getElementById('addCatHint');
    if (!cat) {
      hint.textContent = '輸入漢字後會自動建議類別；你都可以直接改成新類別。';
      return;
    }
    hint.textContent = categoryExists(cat)
      ? `已自動配對到現有類別「${cat}」。`
      : `已建議新類別「${cat}」，儲存後會自動加入分類。`;
  }
  function syncAddCategoryFromZh() {
    const zh = document.getElementById('addZh').value.trim();
    if (!zh || addCatTouched) {
      updateAddCategoryHint(document.getElementById('addCat').value.trim());
      return;
    }
    const cat = suggestedCategory(zh);
    document.getElementById('addCat').value = cat;
    updateAddCategoryHint(cat);
  }
  function showAuditResults(changes) {
    const panel = document.getElementById('auditPanel');
    const summary = document.getElementById('auditSummary');
    const list = document.getElementById('auditList');

    panel.classList.add('show');

    if (!changes.length) {
      summary.textContent = '已檢查目前全部詞語，未發現需要修正的分類。';
      list.innerHTML = '';
      return;
    }

    summary.textContent = `已檢查並自動修正 ${changes.length} 個詞語分類。`;
    list.innerHTML = changes.map(change => `
      <div class="audit-item">「${esc(change.zh)}」由 ${esc(change.from)} 改為 ${esc(change.to)}</div>
    `).join('');
  }
  function auditCategories() {
    const changes = [];

    vocab.forEach(word => {
      const current = normalizeCategory(word.cat);
      const suggested = guessCategory(word.zh);
      if (suggested && current !== suggested) {
        changes.push({ zh: word.zh, from: current, to: suggested });
        word.cat = suggested;
      }
    });

    if (changes.length) {
      saveData();
      renderFilters();
      renderVocab();
      updateCategoryOptions();
      showAuditResults(changes);
      showToast(`已修正 ${changes.length} 個詞語分類`);
      return;
    }

    showAuditResults([]);
    showToast('目前分類全部正常');
  }
  function editWordCategory(id) {
    openEdit(id, 'category');
  }
  function renameCategory(oldCat) {
    if (!oldCat || oldCat === '全部') return;

    const nextCat = prompt(`將類別「${oldCat}」改做咩名？`, oldCat);
    if (nextCat === null) return;

    const normalized = normalizeCategory(nextCat);
    if (normalized === oldCat) return;
    if (categoryExists(normalized)) {
      showToast(`已經有類別「${normalized}」`);
      return;
    }

    let changed = 0;
    vocab.forEach(word => {
      if (word.cat === oldCat) {
        word.cat = normalized;
        changed += 1;
      }
    });

    if (!changed) return;

    if (activeFilter === oldCat) activeFilter = normalized;
    saveData();
    renderFilters();
    renderVocab();
    updateCategoryOptions();
    showToast(`已將「${oldCat}」改名做「${normalized}」`);
  }

  // ── Escape helpers ──
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Tab switching ──
  const TABS = ['Vocab', 'Phonetics', 'Add'];
  function switchTab(t) {
    TABS.forEach(x => {
      document.getElementById('page' + x).classList.toggle('active', x === t);
      document.getElementById('tab' + x).classList.toggle('active', x === t);
    });
  }
  TABS.forEach(t => {
    document.getElementById('tab' + t).addEventListener('click', () => switchTab(t));
  });

  // ── Filter chips ──
  function renderFilters() {
    ensureActiveFilter();
    const row = document.getElementById('filterRow');
    const cats = ['全部', ...uniqueCategories()];
    row.innerHTML = cats.map(c =>
      `<button class="chip${activeFilter === c ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join('');
    row.querySelectorAll('.chip').forEach(btn => {
      const cat = btn.dataset.cat;
      let pressTimer = null;
      let renamed = false;

      const startPress = () => {
        if (cat === '全部') return;
        clearTimeout(pressTimer);
        renamed = false;
        pressTimer = setTimeout(() => {
          renamed = true;
          renameCategory(cat);
        }, 450);
      };

      const cancelPress = () => {
        clearTimeout(pressTimer);
        pressTimer = null;
      };

      btn.addEventListener('mousedown', startPress);
      btn.addEventListener('touchstart', startPress, { passive: true });
      btn.addEventListener('mouseup', cancelPress);
      btn.addEventListener('mouseleave', cancelPress);
      btn.addEventListener('touchend', cancelPress);
      btn.addEventListener('touchcancel', cancelPress);

      btn.addEventListener('click', () => {
        if (renamed) {
          renamed = false;
          return;
        }

        activeFilter = cat;
        renderFilters();
        renderVocab();
      });
    });
  }

  // ── Vocab list ──
  function renderVocab() {
    ensureActiveFilter();
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = vocab;
    if (activeFilter !== '全部') list = list.filter(w => w.cat === activeFilter);
    if (q) list = list.filter(w => w.zh.includes(q) || w.ro.toLowerCase().includes(q));

    document.getElementById('countBar').textContent = `${list.length} 個詞語 · v${APP_VERSION}`;

    const el = document.getElementById('wordList');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">冇搵到相關詞語</div></div>`;
      return;
    }
    el.innerHTML = list.map(w => `
      <div class="word-card">
        <div class="word-zh">${esc(w.zh)}</div>
        <div class="word-info">
          <div class="word-ro">${esc(w.ro)}</div>
          <button class="badge word-cat-btn" data-id="${w.id}" type="button">${esc(w.cat)}</button>
        </div>
        <button class="word-edit-btn" data-id="${w.id}" aria-label="修改">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    `).join('');
    el.querySelectorAll('.word-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEdit(parseInt(btn.dataset.id)));
    });
    el.querySelectorAll('.word-cat-btn').forEach(btn => {
      btn.addEventListener('click', () => editWordCategory(parseInt(btn.dataset.id)));
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderVocab);
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    showToast('重新整理中...');

    if ('serviceWorker' in navigator) {
      try {
        const registration = await navigator.serviceWorker.getRegistration();
        if (registration) await registration.update();
      } catch (err) {
        // Fall back to a normal reload if SW update check fails.
      }
    }

    setTimeout(() => window.location.reload(), 120);
  });
  document.getElementById('auditCategoriesBtn').addEventListener('click', auditCategories);
  document.getElementById('addZh').addEventListener('input', syncAddCategoryFromZh);
  document.getElementById('addCat').addEventListener('input', () => {
    addCatTouched = true;
    updateAddCategoryHint(document.getElementById('addCat').value.trim());
  });
  document.getElementById('addCat').addEventListener('focus', () => {
    if (!document.getElementById('addCat').value.trim()) addCatTouched = false;
  });

  // ── Add word ──
  document.getElementById('addBtn').addEventListener('click', () => {
    const zh  = document.getElementById('addZh').value.trim();
    const ro  = document.getElementById('addRo').value.trim();
    const cat = normalizeCategory(document.getElementById('addCat').value);
    if (!zh || !ro) { showToast('請填寫漢字同注音'); return; }
    const existing = findWordByZh(zh);
    if (existing) {
      existing.ro = ro;
      existing.cat = cat;
      showToast('已更新現有詞語：' + zh);
    } else {
      vocab.push({ id: nextId(), zh, ro, cat });
      showToast('已新增：' + zh);
    }
    saveData(); renderFilters(); renderVocab(); updateCategoryOptions();
    document.getElementById('addZh').value = '';
    document.getElementById('addRo').value = '';
    document.getElementById('addCat').value = '';
    addCatTouched = false;
    updateAddCategoryHint('');
    document.getElementById('addZh').focus();
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const payload = {
      app: '潮汕話詞庫',
      exported_at: new Date().toISOString(),
      version: 1,
      vocab
    };
    const stamp = new Date().toISOString().slice(0, 10);
    downloadFile(`teochew-vocab-backup-${stamp}.json`, JSON.stringify(payload, null, 2), 'application/json');
    showToast('已匯出詞庫備份');
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFileInput').click();
  });

  document.getElementById('importFileInput').addEventListener('change', async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const source = Array.isArray(parsed) ? parsed : parsed.vocab;
      const imported = normalizeImportedVocab(source);

      if (!imported) {
        showToast('匯入失敗：JSON 格式唔啱');
        return;
      }

      vocab = imported;
      activeFilter = '全部';
      saveData();
      renderFilters();
      renderVocab();
      updateCategoryOptions();
      switchTab('Vocab');
      showToast(`已匯入 ${imported.length} 個詞語`);
    } catch (err) {
      showToast('匯入失敗：讀唔到 JSON');
    } finally {
      e.target.value = '';
    }
  });

  // ── Edit modal ──
  function openEdit(id, focusField = '') {
    const w = vocab.find(x => x.id === id);
    if (!w) return;
    document.getElementById('editId').value  = id;
    document.getElementById('editZh').value  = w.zh;
    document.getElementById('editRo').value  = w.ro;
    populateEditCategoryOptions(w.cat);
    syncEditCategoryInputState();
    document.getElementById('editModal').classList.add('open');
    if (focusField === 'category') {
      setTimeout(() => document.getElementById('editCatSelect').focus(), 80);
    }
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('editCatSelect').addEventListener('change', syncEditCategoryInputState);

  document.getElementById('saveEditBtn').addEventListener('click', () => {
    const id  = parseInt(document.getElementById('editId').value);
    const zh  = document.getElementById('editZh').value.trim();
    const ro  = document.getElementById('editRo').value.trim();
    const cat = getEditCategoryValue();
    if (!zh || !ro) { showToast('請填寫漢字同注音'); return; }
    const w = vocab.find(x => x.id === id);
    if (!w) return;
    w.zh = zh; w.ro = ro; w.cat = cat;
    saveData(); renderFilters(); renderVocab(); updateCategoryOptions();
    closeModal();
    showToast('已更新：' + zh);
  });

  document.getElementById('deleteBtn').addEventListener('click', () => {
    const id = parseInt(document.getElementById('editId').value);
    const w  = vocab.find(x => x.id === id);
    if (!w) return;
    if (!confirm(`確定刪除「${w.zh}」？`)) return;
    vocab = vocab.filter(x => x.id !== id);
    saveData(); renderFilters(); renderVocab(); updateCategoryOptions();
    closeModal();
    showToast('已刪除：' + w.zh);
  });

  // ── Sentence phonetics ──
  document.getElementById('analyzeBtn').addEventListener('click', () => {
    const sentence = document.getElementById('sentenceInput').value;
    if (!sentence.trim()) { showToast('請輸入句子'); return; }

    const tokens = [];
    let i = 0;
    while (i < sentence.length) {
      const ch = sentence[i];
      if (/\s/.test(ch)) {
        tokens.push({ zh: ' ', ro: '', space: true });
        i++; continue;
      }
      let matched = false;
      const maxLen = Math.min(6, sentence.length - i);
      for (let len = maxLen; len >= 1; len--) {
        const sub = sentence.substring(i, i + len);
        const word = vocab.find(w => w.zh === sub);
        if (word) {
          tokens.push({ zh: sub, ro: word.ro, known: true });
          i += len; matched = true; break;
        }
      }
      if (!matched) {
        tokens.push({ zh: ch, ro: '—', known: false });
        i++;
      }
    }

    const container = document.getElementById('phoneticTokens');
    container.innerHTML = tokens.map(t => {
      if (t.space) return `<div class="phonetic-token space"><div class="p-zh"> </div></div>`;
      return `<div class="phonetic-token${t.known ? '' : ' unknown'}" data-zh="${esc(t.zh)}">
        <div class="p-ro">${esc(t.ro)}</div>
        <div class="p-zh">${esc(t.zh)}</div>
      </div>`;
    }).join('');
    container.querySelectorAll('.phonetic-token.unknown').forEach(el => {
      el.addEventListener('click', () => openQuickAdd(el.dataset.zh));
    });
    document.getElementById('resultArea').classList.add('show');
  });

  // ── Quick-add modal ──
  function openQuickAdd(zh) {
    document.getElementById('qaZh').value  = zh;
    document.getElementById('qaRo').value  = '';
    document.getElementById('qaCat').value = suggestedCategory(zh);
    document.getElementById('quickAddModal').classList.add('open');
    setTimeout(() => document.getElementById('qaRo').focus(), 300);
  }

  function closeQuickAdd() {
    document.getElementById('quickAddModal').classList.remove('open');
  }

  document.getElementById('quickAddModal').addEventListener('click', e => {
    if (e.target === document.getElementById('quickAddModal')) closeQuickAdd();
  });
  document.getElementById('qaCancelBtn').addEventListener('click', closeQuickAdd);

  document.getElementById('qaSaveBtn').addEventListener('click', () => {
    const zh  = document.getElementById('qaZh').value.trim();
    const ro  = document.getElementById('qaRo').value.trim();
    const cat = normalizeCategory(document.getElementById('qaCat').value);
    if (!ro) { showToast('請輸入注音'); return; }
    const existing = findWordByZh(zh);
    if (existing) {
      existing.ro = ro;
      existing.cat = cat;
      showToast('已更新現有詞語：' + zh);
    } else {
      vocab.push({ id: nextId(), zh, ro, cat });
      showToast('已新增：' + zh);
    }
    saveData(); renderFilters(); renderVocab(); updateCategoryOptions();
    closeQuickAdd();
    // 重新分析句子
    document.getElementById('analyzeBtn').click();
  });

  // ── Toast ──
  let _toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Init ──
  loadData();
  renderFilters();
  renderVocab();
  updateCategoryOptions();
  updateAddCategoryHint('');
  syncEditCategoryInputState();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(`./sw.js?v=${APP_VERSION}`);
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }
</script>
</body>
</html>
